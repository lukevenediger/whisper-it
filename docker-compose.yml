services:
  whisper-it:
    build:
      context: .
      args:
        COMMIT_HASH: ${COMMIT_HASH:-dev}
    ports:
      - "4000:4000"
    volumes:
      - whisper-models:/models
      - whisper-data:/data
      # Debug-only: expose test audio fixtures so the UI can pick one with a button.
      # Mount is harmless when WHISPER_DEBUG_FIXTURES=0 (default).
      - ./tests/fixtures/audio:/fixtures:ro
    environment:
      # OpenRouter key for cloud speaker attribution. Optional — users can also bring their own key in-browser.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Debug fixtures dropdown — set to 1 to expose tests/fixtures/audio/* in the UI.
      WHISPER_DEBUG_FIXTURES: ${WHISPER_DEBUG_FIXTURES:-0}
    # Memory budget — base/small + chunking fit easily; bump if running medium/large-v3 on long audio.
    # If your Docker Desktop VM has < 8 GB allocated overall, raise it in Settings → Resources.
    mem_limit: 8g
    mem_reservation: 2g
    restart: unless-stopped

volumes:
  whisper-models:
  whisper-data:
