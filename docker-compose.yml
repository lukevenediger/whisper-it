services:
  whisper-it:
    build:
      context: .
      args:
        COMMIT_HASH: ${COMMIT_HASH:-dev}
    ports:
      - "4000:4000"
    volumes:
      - whisper-models:/models
      - whisper-data:/data
    environment:
      # Speaker attribution (diarization). Off by default. To enable:
      #   1. Accept terms at https://huggingface.co/pyannote/speaker-diarization-3.1
      #   2. Generate an HF token, then either export it locally or put both lines in a .env file:
      #        WHISPER_DIARIZE=1
      #        HF_TOKEN=hf_xxx
      WHISPER_DIARIZE: ${WHISPER_DIARIZE:-0}
      HF_TOKEN: ${HF_TOKEN:-}
      # OpenRouter key for Phase 2 (cloud/BYOK attribution). Optional — users can also bring their own key in-browser.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    # Memory budget — base/small + chunking fit easily; bump if running medium/large-v3 on long audio.
    # If your Docker Desktop VM has < 8 GB allocated overall, raise it in Settings → Resources.
    mem_limit: 8g
    mem_reservation: 2g
    restart: unless-stopped

volumes:
  whisper-models:
  whisper-data:
