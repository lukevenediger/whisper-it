<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisper It · Stats</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f0f; color: #e0e0e0;
    display: flex; justify-content: center;
    min-height: 100vh; padding: 2rem 1rem;
  }
  .container { max-width: 760px; width: 100%; }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1.5rem; gap: 1rem;
  }
  h1 { font-size: 1.5rem; color: #fff; }
  h1 span { color: #888; font-weight: 400; font-size: 0.9rem; }
  .nav-link {
    color: #5b8def; text-decoration: none; font-size: 0.85rem;
    padding: 0.4rem 0.75rem; border-radius: 6px; border: 1px solid #2a3f5f;
  }
  .nav-link:hover { background: rgba(91,141,239,0.1); }
  .empty { color: #888; padding: 2rem; text-align: center;
    border: 1px dashed #333; border-radius: 8px; }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0.75rem; margin-bottom: 1.5rem;
  }
  .stat-card {
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    padding: 1rem 1.1rem;
  }
  .stat-label {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: #888; margin-bottom: 0.4rem;
  }
  .stat-value {
    font-size: 1.6rem; font-weight: 600; color: #fff;
    font-variant-numeric: tabular-nums;
  }
  .stat-sub { font-size: 0.8rem; color: #888; margin-top: 0.3rem; }

  .panel {
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    padding: 1.1rem 1.25rem; margin-bottom: 1rem;
  }
  .panel h2 { font-size: 0.95rem; color: #ccc; margin-bottom: 0.9rem; font-weight: 600; }

  .bar-row {
    display: grid; grid-template-columns: 7rem 1fr 4rem;
    gap: 0.75rem; align-items: center; margin-bottom: 0.4rem;
    font-size: 0.85rem;
  }
  .bar-label { color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track {
    background: #252525; border-radius: 4px; height: 12px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; background: #5b8def; border-radius: 4px;
    transition: width 0.4s ease;
  }
  .bar-value { color: #888; text-align: right; font-variant-numeric: tabular-nums; }

  .day-chart {
    display: flex; align-items: flex-end; gap: 2px;
    height: 100px; margin-top: 0.5rem;
    border-bottom: 1px solid #333; padding-bottom: 0.25rem;
  }
  .day-bar {
    flex: 1; background: #5b8def; border-radius: 2px 2px 0 0;
    min-height: 1px; position: relative; cursor: default;
  }
  .day-bar:hover { background: #7da4f3; }
  .day-bar[data-zero="1"] { background: #2a2a2a; }
  .day-axis {
    display: flex; justify-content: space-between;
    font-size: 0.7rem; color: #666; margin-top: 0.3rem;
  }

  .recent-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .recent-item {
    display: grid; grid-template-columns: 1fr auto;
    gap: 0.5rem; padding: 0.5rem 0.75rem;
    background: #141414; border: 1px solid #2a2a2a; border-radius: 6px;
    font-size: 0.85rem;
  }
  .recent-name { color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .recent-meta { color: #777; font-size: 0.75rem; text-align: right; }

  .footer-note { font-size: 0.75rem; color: #666; margin-top: 1rem; text-align: center; }
  .footer {
    margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid #1f1f1f;
    font-size: 0.75rem; color: #666; display: flex; gap: 0.75rem;
    flex-wrap: wrap; justify-content: center; align-items: center;
  }
  .footer a {
    color: #888; text-decoration: underline;
    text-decoration-color: #3a3a3a; text-underline-offset: 2px;
  }
  .footer a:hover { color: #ccc; text-decoration-color: #777; }
  .footer a code { color: inherit; }
  .footer .sep { color: #333; }
  .footer code { font-family: ui-monospace, monospace; color: #888; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <h1>Whisper It <span>stats</span></h1>
    <a class="nav-link" href="/">← Back</a>
  </div>

  <div id="content">
    <div class="empty" id="loading">Loading…</div>
  </div>

  <div class="footer">
    <a href="https://github.com/lukevenediger/whisper-it" target="_blank" rel="noopener">GitHub</a>
    <span class="sep">·</span>
    <a href="https://x.com/jumpdest7d" target="_blank" rel="noopener">@jumpdest7d</a>
  </div>
</div>

<script>
const $ = (s) => document.getElementById(s);

function formatDuration(s) {
  if (!s || s < 0) return "0s";
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.round(s % 60);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${sec}s`;
  return `${sec}s`;
}

function formatBytes(b) {
  if (!b) return "0 B";
  const units = ["B", "KB", "MB", "GB", "TB"];
  let i = 0; let n = b;
  while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
  return `${n.toFixed(n < 10 && i > 0 ? 1 : 0)} ${units[i]}`;
}

function formatNumber(n) {
  return (n || 0).toLocaleString();
}

function formatTimestamp(ts) {
  if (!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleString([], { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}

function dayKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function lastNDays(n) {
  const out = [];
  const today = new Date();
  today.setHours(0,0,0,0);
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    out.push({ date: d, key: dayKey(d) });
  }
  return out;
}

function statCard(label, value, sub) {
  return `<div class="stat-card">
    <div class="stat-label">${label}</div>
    <div class="stat-value">${value}</div>
    ${sub ? `<div class="stat-sub">${sub}</div>` : ""}
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function render(stats) {
  if (!stats || stats.total === 0) {
    $("content").innerHTML = `<div class="empty">No transcriptions yet.<br>Once you transcribe some audio, stats will appear here.</div>`;
    return;
  }

  const avgDur = stats.total ? stats.totalDurationSec / stats.total : 0;
  const avgWords = stats.total ? Math.round(stats.totalWords / stats.total) : 0;
  const wpm = stats.totalDurationSec ? Math.round((stats.totalWords / stats.totalDurationSec) * 60) : 0;

  // Top-level cards
  let html = `<div class="grid">
    ${statCard("Total transcriptions", formatNumber(stats.total), `since ${formatTimestamp(stats.firstAt)}`)}
    ${statCard("Audio transcribed", formatDuration(stats.totalDurationSec), `${formatBytes(stats.totalAudioBytes)} processed`)}
    ${statCard("Words produced", formatNumber(stats.totalWords), `~${wpm} wpm spoken`)}
    ${statCard("Avg per item", formatDuration(avgDur), `${formatNumber(avgWords)} words avg`)}
    ${statCard("Recordings", formatNumber(stats.recordingCount), `vs ${formatNumber(stats.uploadCount)} uploads`)}
    ${statCard("Last activity", formatTimestamp(stats.lastAt), "")}
  </div>`;

  // By model
  const modelEntries = Object.entries(stats.byModel || {}).sort((a,b) => b[1].count - a[1].count);
  if (modelEntries.length > 0) {
    const maxCount = Math.max(...modelEntries.map(([,v]) => v.count));
    html += `<div class="panel"><h2>By model</h2>`;
    for (const [name, v] of modelEntries) {
      const pct = maxCount ? (v.count / maxCount) * 100 : 0;
      html += `<div class="bar-row">
        <div class="bar-label">${escapeHtml(name)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-value">${v.count} · ${formatDuration(v.durationSec)}</div>
      </div>`;
    }
    html += `</div>`;
  }

  // By language
  const langEntries = Object.entries(stats.byLanguage || {}).sort((a,b) => b[1] - a[1]);
  if (langEntries.length > 0) {
    const maxL = Math.max(...langEntries.map(([,v]) => v));
    html += `<div class="panel"><h2>By language</h2>`;
    for (const [name, v] of langEntries) {
      const pct = maxL ? (v / maxL) * 100 : 0;
      html += `<div class="bar-row">
        <div class="bar-label">${escapeHtml(name || "—")}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:#9c6ade"></div></div>
        <div class="bar-value">${v}</div>
      </div>`;
    }
    html += `</div>`;
  }

  // Last 30 days chart
  const days = lastNDays(30);
  const dayCounts = days.map(d => stats.byDay[d.key] || 0);
  const maxDay = Math.max(1, ...dayCounts);
  html += `<div class="panel"><h2>Last 30 days</h2><div class="day-chart">`;
  for (let i = 0; i < days.length; i++) {
    const c = dayCounts[i];
    const h = c > 0 ? Math.max(2, (c / maxDay) * 100) : 1;
    html += `<div class="day-bar" style="height:${h}%" data-zero="${c === 0 ? 1 : 0}" title="${days[i].key}: ${c}"></div>`;
  }
  html += `</div><div class="day-axis"><span>${days[0].key}</span><span>${days[days.length - 1].key}</span></div></div>`;

  // Longest item
  if (stats.longest) {
    html += `<div class="panel"><h2>Longest transcription</h2>
      <div style="font-size:0.9rem; color:#ccc; margin-bottom:0.25rem;">${escapeHtml(stats.longest.filename || "—")}</div>
      <div style="font-size:0.8rem; color:#888;">${formatDuration(stats.longest.durationSec)} · ${stats.longest.words} words · ${escapeHtml(stats.longest.model)} model · ${formatTimestamp(stats.longest.ts)}</div>
    </div>`;
  }

  // Recent
  if (stats.recent && stats.recent.length > 0) {
    html += `<div class="panel"><h2>Recent activity</h2><div class="recent-list">`;
    for (const ev of stats.recent.slice(0, 15)) {
      html += `<div class="recent-item">
        <div class="recent-name">${ev.fromRecording ? "🎙 " : ""}${escapeHtml(ev.filename || "—")}</div>
        <div class="recent-meta">${formatDuration(ev.durationSec)} · ${escapeHtml(ev.model)} · ${formatTimestamp(ev.ts)}</div>
      </div>`;
    }
    html += `</div></div>`;
  }

  html += `<div class="footer-note">Stats persisted server-side at <code>${escapeHtml(window.location.origin)}/api/stats</code></div>`;

  $("content").innerHTML = html;
}

async function load() {
  try {
    const res = await fetch("/api/stats");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    render(data);
  } catch (err) {
    $("content").innerHTML = `<div class="empty">Failed to load stats: ${escapeHtml(err.message)}</div>`;
  }
}

load();
</script>
</body>
</html>
