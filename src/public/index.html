<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisper It</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f0f; color: #e0e0e0;
    display: flex; justify-content: center;
    min-height: 100vh; padding: 2rem 1rem;
  }
  .container { max-width: 640px; width: 100%; }
  h1 { font-size: 1.5rem; color: #fff; }
  h1 span { color: #888; font-weight: 400; font-size: 0.9rem; }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1.5rem; gap: 1rem;
  }
  .nav-link {
    color: #5b8def; text-decoration: none; font-size: 0.85rem;
    padding: 0.4rem 0.75rem; border-radius: 6px; border: 1px solid #2a3f5f;
  }
  .nav-link:hover { background: rgba(91,141,239,0.1); }
  .vanity {
    font-size: 0.75rem; color: #777; margin: -0.75rem 0 1.25rem;
    font-variant-numeric: tabular-nums; letter-spacing: 0.01em;
    opacity: 0; transition: opacity 0.4s ease;
  }
  .vanity.visible { opacity: 1; }
  .vanity a { color: inherit; text-decoration: none; }
  .vanity a:hover { color: #aaa; }
  .footer {
    margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid #1f1f1f;
    font-size: 0.75rem; color: #666; display: flex; gap: 0.75rem;
    flex-wrap: wrap; justify-content: center; align-items: center;
  }
  .footer a {
    color: #888; text-decoration: underline;
    text-decoration-color: #3a3a3a; text-underline-offset: 2px;
  }
  .footer a:hover { color: #ccc; text-decoration-color: #777; }
  .footer a code { color: inherit; }
  .footer .sep { color: #333; }
  .footer code { font-family: ui-monospace, monospace; color: #888; }

  .controls { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
  select, button {
    padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #333;
    background: #1a1a1a; color: #e0e0e0; font-size: 0.9rem; cursor: pointer;
  }
  select:focus, button:focus { outline: 2px solid #5b8def; outline-offset: -1px; }
  button:hover { background: #252525; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #5b8def; color: #fff; border-color: #5b8def; font-weight: 600; }
  .btn-primary:hover { background: #4a7de0; }
  .btn-record { background: #1a1a1a; }
  .btn-record.recording { background: #d32f2f; border-color: #d32f2f; color: #fff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

  .drop-zone {
    border: 2px dashed #333; border-radius: 8px; padding: 2rem;
    text-align: center; color: #666; margin-bottom: 1rem;
    transition: border-color 0.2s, background 0.2s; cursor: pointer;
  }
  .drop-zone.dragover { border-color: #5b8def; background: rgba(91,141,239,0.05); }
  .drop-zone.has-file { border-color: #4caf50; color: #aaa; }
  .drop-zone input { display: none; }
  .file-name { color: #5b8def; font-weight: 500; word-break: break-all; }

  .recording-viz {
    display: none; flex-direction: column; align-items: center; gap: 0.75rem;
    padding: 1.5rem; border: 2px solid #d32f2f; border-radius: 8px;
    background: rgba(211,47,47,0.05); margin-bottom: 1rem;
  }
  .recording-viz.visible { display: flex; }
  .recording-viz canvas { width: 100%; height: 60px; border-radius: 4px; }
  .recording-timer {
    font-size: 1.5rem; font-weight: 600; color: #d32f2f;
    font-variant-numeric: tabular-nums;
  }

  .waveform-container {
    display: none; margin-bottom: 1rem; border: 1px solid #333;
    border-radius: 8px; overflow: hidden; background: #1a1a1a;
  }
  .waveform-container.visible { display: block; }
  .waveform-container canvas { width: 100%; height: 80px; display: block; }

  .result {
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    padding: 1.25rem; margin-top: 1rem; display: none; position: relative;
  }
  .result.visible { display: block; }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .result-meta { font-size: 0.8rem; color: #888; }
  .result-actions { display: flex; gap: 0.5rem; }
  .action-btn {
    padding: 0.3rem 0.6rem; font-size: 0.8rem; border-radius: 4px;
    background: #252525; border: 1px solid #444; color: #ccc; cursor: pointer;
  }
  .action-btn:hover { background: #333; }
  .transcript { white-space: pre-wrap; line-height: 1.6; font-size: 0.95rem; }

  .retranscribe {
    display: none; align-items: center; gap: 0.5rem;
    margin-top: 1rem; padding: 0.75rem 1rem;
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    font-size: 0.85rem; color: #888; flex-wrap: wrap;
  }
  .retranscribe.visible { display: flex; }
  .retranscribe select { padding: 0.3rem 0.5rem; font-size: 0.85rem; }
  .retranscribe button { padding: 0.3rem 0.75rem; font-size: 0.85rem; }

  .spinner {
    display: none; margin: 1.5rem auto; width: 32px; height: 32px;
    border: 3px solid #333; border-top-color: #5b8def; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .spinner.visible { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { text-align: center; color: #888; margin-top: 0.5rem; font-size: 0.85rem; }

  .progress-bar-container {
    width: 60%; margin: 0.5rem auto 0; background: #252525;
    border-radius: 4px; height: 6px; overflow: hidden; display: none;
  }
  .progress-bar-container.visible { display: block; }
  .progress-bar {
    height: 100%; background: #5b8def; border-radius: 4px;
    transition: width 0.3s ease; width: 0%;
  }

  .mic-selector {
    display: none; margin-bottom: 1rem;
    font-size: 0.85rem;
  }
  .mic-selector.visible { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
  .mic-selector-label { color: #888; margin-right: 0.25rem; }
  .mic-option {
    display: inline-block; cursor: pointer;
  }
  .mic-option input[type="radio"] { display: none; }
  .mic-option span {
    display: inline-block; padding: 0.35rem 0.75rem; border-radius: 6px;
    border: 1px solid #333; background: #1a1a1a; color: #999;
    transition: all 0.15s;
  }
  .mic-option input[type="radio"]:checked + span {
    border-color: #5b8def; background: rgba(91,141,239,0.1); color: #fff;
  }
  .mic-option:hover span { border-color: #555; color: #ccc; }

  .error { color: #ef5350; background: rgba(239,83,80,0.1); padding: 0.75rem; border-radius: 6px; margin-top: 1rem; display: none; }
  .error.visible { display: block; }

  .history { margin-top: 2rem; display: none; }
  .history.visible { display: block; }
  .history-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid #333;
  }
  .history-title { font-size: 0.95rem; color: #ccc; font-weight: 600; }
  .history-title span { color: #666; font-weight: 400; font-size: 0.8rem; margin-left: 0.4rem; }
  .history-clear {
    padding: 0.3rem 0.6rem; font-size: 0.8rem; border-radius: 4px;
    background: #252525; border: 1px solid #444; color: #ccc; cursor: pointer;
  }
  .history-clear:hover { background: #3a1f1f; border-color: #d32f2f; color: #ef5350; }
  .history-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .history-item {
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
    padding: 0.75rem 0.9rem; cursor: pointer; transition: border-color 0.15s;
  }
  .history-item:hover { border-color: #444; }
  .history-item.latest { border-color: #5b8def; background: #17212f; }
  .history-item.latest:hover { border-color: #6d9bf5; }
  .history-item.latest .history-item-preview { color: #e0e0e0; font-size: 0.95rem; }
  .history-item-header {
    display: flex; justify-content: space-between; align-items: center;
    gap: 0.5rem; margin-bottom: 0.35rem;
  }
  .history-item-title {
    font-size: 0.95rem; color: #fff; font-weight: 600;
    margin-bottom: 0.25rem; word-break: break-word;
    display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
  }
  .batch-badge {
    display: inline-block; padding: 0.1rem 0.5rem; border-radius: 10px;
    background: rgba(91,141,239,0.15); color: #8db5f5; border: 1px solid #2a3f5f;
    font-size: 0.7rem; font-weight: 500; cursor: pointer;
  }
  .batch-badge:hover { background: rgba(91,141,239,0.25); }
  .recording-badge {
    display: inline-block; padding: 0.1rem 0.5rem; border-radius: 10px;
    background: rgba(211,47,47,0.15); color: #ef9a9a; border: 1px solid #5a2828;
    font-size: 0.7rem; font-weight: 500;
  }
  .history-item-meta { font-size: 0.75rem; color: #888; }
  .queue-status {
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.85rem;
    color: #ccc; display: none;
  }
  .queue-status.visible { display: block; }
  .queue-status-title { font-weight: 600; color: #fff; margin-bottom: 0.4rem; }
  .queue-list { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.8rem; }
  .queue-item { color: #888; display: flex; gap: 0.5rem; align-items: center; }
  .queue-item.active { color: #5b8def; }
  .queue-item.done { color: #4caf50; }
  .queue-item.error { color: #ef5350; }
  .queue-item-status { font-family: monospace; min-width: 1rem; }
  .queue-item-info {
    font-size: 0.75rem; color: #888; margin-left: 1.5rem; margin-top: 0.15rem;
    line-height: 1.4;
  }
  .queue-item-info .eta { color: #5b8def; font-variant-numeric: tabular-nums; }
  .history-item-actions { display: flex; gap: 0.35rem; }
  .history-item-actions button {
    padding: 0.2rem 0.5rem; font-size: 0.75rem; border-radius: 4px;
    background: #252525; border: 1px solid #3a3a3a; color: #aaa; cursor: pointer;
  }
  .history-item-actions button:hover { background: #333; color: #eee; }
  .history-item-actions .del:hover { background: #3a1f1f; border-color: #d32f2f; color: #ef5350; }
  .history-item-preview {
    font-size: 0.85rem; color: #bbb; line-height: 1.4;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .history-item.expanded .history-item-preview {
    -webkit-line-clamp: unset; white-space: pre-wrap;
  }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <h1>Whisper It <span>local transcription</span></h1>
    <a class="nav-link" href="/stats.html">Stats</a>
  </div>
  <div class="vanity" id="vanity"></div>

  <div class="controls">
    <select id="model" title="Whisper model">
      <option value="tiny">tiny (~75MB)</option>
      <option value="base">base (~140MB)</option>
      <option value="small" selected>small (~460MB)</option>
      <option value="medium">medium (~1.5GB)</option>
      <option value="large-v3">large-v3 (~3GB)</option>
    </select>
    <select id="language" title="Force a language (or auto-detect)">
      <option value="auto" selected>Auto-detect</option>
      <option value="en">English (en)</option>
      <option value="es">Spanish (es)</option>
      <option value="fr">French (fr)</option>
      <option value="de">German (de)</option>
      <option value="it">Italian (it)</option>
      <option value="pt">Portuguese (pt)</option>

      <option value="sv">Swedish (sv)</option>
      <option value="da">Danish (da)</option>
      <option value="no">Norwegian (no)</option>
      <option value="fi">Finnish (fi)</option>
      <option value="cs">Czech (cs)</option>
      <option value="hu">Hungarian (hu)</option>
      <option value="ro">Romanian (ro)</option>
      <option value="el">Greek (el)</option>
      <option value="ja">Japanese (ja)</option>
      <option value="ko">Korean (ko)</option>
      <option value="zh">Chinese (zh)</option>
      <option value="ar">Arabic (ar)</option>
      <option value="he">Hebrew (he)</option>
      <option value="hi">Hindi (hi)</option>
      <option value="bn">Bengali (bn)</option>
      <option value="ur">Urdu (ur)</option>
      <option value="fa">Persian (fa)</option>
      <option value="th">Thai (th)</option>
      <option value="vi">Vietnamese (vi)</option>
      <option value="id">Indonesian (id)</option>

      <option value="sw">Swahili (sw)</option>
      <option value="zu">Zulu (zu)</option>
      <option value="xh">Xhosa (xh)</option>

      <option value="cy">Welsh (cy)</option>
      <option value="ga">Irish (ga)</option>

    </select>
    <button id="recordBtn" class="btn-record" title="Record from microphone">Record</button>

  <div class="mic-selector" id="micSelector">

    <div id="micList" style="display:contents"></div>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" multiple accept="audio/*,.mp3,.m4a,.wav,.ogg,.webm,.flac,.aac">

  </div>

  <div class="queue-status" id="queueStatus">

  <div class="recording-viz" id="recordingViz">
    <canvas id="vizCanvas"></canvas>
    <div class="recording-timer" id="recordingTimer">00:00</div>
  </div>

  <div class="waveform-container" id="waveformContainer">
    <canvas id="waveformCanvas"></canvas>
  </div>

  <div class="spinner" id="spinner"></div>

    <div class="progress-bar" id="progressBar"></div>

  <div class="retranscribe" id="retranscribe">
    <span>Re-transcribe with:</span>
    <select id="retranscribeModel"></select>

  <div class="history" id="history">
    <div class="history-header">
      <div class="history-title">Transcriptions <span id="historyCount"></span></div>
      <button class="history-clear" id="historyClear">Clear all</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="footer">
    <a href="https://github.com/lukevenediger/whisper-it" target="_blank" rel="noopener">GitHub</a>
    <span class="sep">·</span>
    <a href="https://x.com/jumpdest7d" target="_blank" rel="noopener">@jumpdest7d</a>
  </div>
</div>

<script>
const $ = (s) => document.getElementById(s);
const dropZone = $("dropZone");
const fileInput = $("fileInput");
const recordBtn = $("recordBtn");
const spinner = $("spinner");
const statusEl = $("status");
const errorEl = $("error");
const modelSelect = $("model");
const languageSelect = $("language");
const recordingViz = $("recordingViz");
const vizCanvas = $("vizCanvas");
const vizCtx = vizCanvas.getContext("2d");
const recordingTimer = $("recordingTimer");
const progressContainer = $("progressContainer");
const progressBar = $("progressBar");
const retranscribeEl = $("retranscribe");
const retranscribeModel = $("retranscribeModel");
const retranscribeBtn = $("retranscribeBtn");
const waveformContainer = $("waveformContainer");
const waveformCanvas = $("waveformCanvas");
const waveformCtx = waveformCanvas.getContext("2d");

const micSelector = $("micSelector");
const micList = $("micList");
const queueStatus = $("queueStatus");
const queueStatusTitle = $("queueStatusTitle");
const queueListEl = $("queueList");

let currentFile = null;
let currentFileIsRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let lastResult = null;
let isTranscribing = false;
let selectedMicId = localStorage.getItem("whisper-it-mic") || "default";

// Persist model + language across sessions
const savedModel = localStorage.getItem("whisper-it-model");
if (savedModel) modelSelect.value = savedModel;
modelSelect.addEventListener("change", () => localStorage.setItem("whisper-it-model", modelSelect.value));

const savedLang = localStorage.getItem("whisper-it-language");
if (savedLang) languageSelect.value = savedLang;
languageSelect.addEventListener("change", () => localStorage.setItem("whisper-it-language", languageSelect.value));

let processingQueue = false;
let queue = []; // { file, isRecording, batchId, batchIndex, batchSize, status, progress? }
let currentTranscribingItem = null;
const ORIG_TITLE = document.title;

// Approximate audio-seconds processed per wall-second by model (CPU int8, cpu_threads=2)
const MODEL_SPEED = { tiny: 18, base: 10, small: 5, medium: 2.2, "large-v3": 1.2 };

function fmtEta(sec) {
  if (sec == null || !isFinite(sec) || sec <= 0) return "";
  if (sec < 60) return `${Math.round(sec)}s`;
  const m = Math.floor(sec / 60);
  const s = Math.round(sec % 60);
  if (m < 60) return s ? `${m}m ${s}s` : `${m}m`;
  const h = Math.floor(m / 60);
  const mm = m % 60;
  return mm ? `${h}h ${mm}m` : `${h}h`;
}

function setTabTitle(suffix) {
  document.title = suffix ? `${suffix} — ${ORIG_TITLE}` : ORIG_TITLE;
}

// --- Microphone enumeration ---

async function enumerateMics() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const mics = devices.filter(d => d.kind === "audioinput");
    if (mics.length <= 1) {
      micSelector.classList.remove("visible");
      return;
    }
    micSelector.classList.add("visible");
    const prevSelected = selectedMicId;
    micList.innerHTML = "";

    // Sort so "default" device appears first
    const hasDefault = mics.some(m => m.deviceId === "default");
    const sorted = [...mics].sort((a, b) => (a.deviceId === "default" ? -1 : b.deviceId === "default" ? 1 : 0));

    sorted.forEach((mic, i) => {
      let label = mic.label || `Microphone ${i + 1}`;
      // Shorten "Default - Realtek USB2.0 Audio" to just "Default"
      if (mic.deviceId === "default") label = "Default";

      const isSelected = prevSelected === mic.deviceId
        || (!prevSelected && mic.deviceId === "default")
        || (!prevSelected && !hasDefault && i === 0);

      const option = document.createElement("label");
      option.className = "mic-option";
      option.innerHTML = `<input type="radio" name="mic" value="${mic.deviceId}" ${isSelected ? "checked" : ""}><span>${label}</span>`;
      option.querySelector("input").addEventListener("change", (e) => {
        selectedMicId = e.target.value;
        localStorage.setItem("whisper-it-mic", selectedMicId);
      });
      if (isSelected) selectedMicId = mic.deviceId;
      micList.appendChild(option);
    });
  } catch {
    // Can't enumerate — will use default mic
  }
}

// Enumerate on load (labels may be empty until permission is granted)
enumerateMics();
// Re-enumerate when devices change (e.g. plugging in a headset)
navigator.mediaDevices.addEventListener("devicechange", enumerateMics);

// --- File upload (auto-transcribe on selection) ---

dropZone.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => {
  if (fileInput.files && fileInput.files.length > 0) enqueueFiles(Array.from(fileInput.files));
  fileInput.value = "";
});

dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  if (e.dataTransfer.files && e.dataTransfer.files.length > 0) enqueueFiles(Array.from(e.dataTransfer.files));
});

function setFile(file, isRecording) {
  currentFile = file;
  currentFileIsRecording = !!isRecording;
  dropZone.classList.add("has-file");
  dropZone.querySelector("p").innerHTML = `<span class="file-name">${file.name}</span> (${(file.size / 1024 / 1024).toFixed(1)} MB)`;
}

function enqueueFiles(files) {
  if (!files.length) return;
  const isBatch = files.length > 1;
  const batchId = isBatch ? newId() : null;
  const startIdx = queue.length;
  files.forEach((file, i) => {
    queue.push({
      file,
      isRecording: false,
      batchId,
      batchIndex: isBatch ? startIdx + i + 1 : null,
      batchSize: isBatch ? files.length : null,
      status: "pending",
    });
  });
  renderQueue();
  if (!processingQueue) processQueue();
}

function newId() {
  return (crypto.randomUUID && crypto.randomUUID()) || String(Date.now()) + Math.random().toString(36).slice(2);
}

async function processQueue() {
  if (processingQueue) return;
  processingQueue = true;
  while (queue.some(q => q.status === "pending")) {
    const item = queue.find(q => q.status === "pending");
    item.status = "active";
    item.progress = { phase: "starting" };
    currentTranscribingItem = item;
    renderQueue();
    setFile(item.file, item.isRecording);
    try {
      await renderWaveform(item.file);
    } catch {}
    try {
      await doTranscribe(undefined, {
        sourceFilename: item.file.name,
        isRecording: item.isRecording,
        batchId: item.batchId,
        batchIndex: item.batchIndex,
        batchSize: item.batchSize,
      });
      item.status = "done";
    } catch {
      item.status = "error";
    }
    item.progress = null;
    currentTranscribingItem = null;
    setTabTitle("");
    renderQueue();
  }
  processingQueue = false;
  // Auto-clear queue UI shortly after batch finishes
  setTimeout(() => {
    if (!processingQueue) { queue = []; renderQueue(); }
  }, 4000);
}

function renderQueue() {
  if (queue.length === 0) {
    queueStatus.classList.remove("visible");
    return;
  }
  queueStatus.classList.add("visible");
  const total = queue.length;
  const done = queue.filter(q => q.status === "done").length;
  const errored = queue.filter(q => q.status === "error").length;
  if (total === 1) {
    queueStatusTitle.textContent = queue[0].status === "done" ? "Done" : queue[0].status === "error" ? "Error" : "Transcribing";
  } else {
    queueStatusTitle.textContent = `Batch ${done + errored}/${total} ${errored ? `(${errored} failed)` : ""}`.trim();
  }
  queueListEl.innerHTML = "";
  queue.forEach(q => {
    const row = document.createElement("div");
    row.className = "queue-item " + q.status;
    const icon = q.status === "done" ? "✓" : q.status === "error" ? "✗" : q.status === "active" ? "▶" : "·";
    const idxLabel = q.batchSize ? ` [${q.batchIndex}/${q.batchSize}]` : "";
    const head = `<div><span class="queue-item-status">${icon}</span><span>${escapeHtml(q.file.name)}${idxLabel}</span></div>`;
    const sub = q.status === "active" && q.progress ? renderProgressLine(q.progress) : "";
    row.innerHTML = head + sub;
    queueListEl.appendChild(row);
  });
}

function renderProgressLine(p) {
  if (!p) return "";
  const parts = [];
  if (p.phase === "starting") parts.push("Starting…");
  else if (p.phase === "loading_model") parts.push("Loading model…");
  else if (p.phase === "downloading") parts.push(`Downloading model · ${p.downloadProgress || 0}%`);
  else if (p.phase === "chunking") {
    const mins = p.audioDuration ? Math.round(p.audioDuration / 60) : null;
    parts.push(`Long audio${mins != null ? ` (${mins} min)` : ""} — splitting…`);
    if (p.etaSec) parts.push(`<span class="eta">ETA ~${fmtEta(p.etaSec)}</span>`);
  } else if (p.phase === "chunked") {
    parts.push(`Split into ${p.totalChunks} × ${Math.round(p.chunkSeconds/60)} min chunks`);
    if (p.etaSec) parts.push(`<span class="eta">ETA ~${fmtEta(p.etaSec)}</span>`);
  } else if (p.phase === "transcribing") {
    if (p.totalChunks) {
      parts.push(`Chunk ${p.currentChunk}/${p.totalChunks}`);
      if (p.etaSec) parts.push(`<span class="eta">ETA ~${fmtEta(p.etaSec)}</span>`);
    } else {
      parts.push("Transcribing…");
      if (p.etaSec) parts.push(`<span class="eta">ETA ~${fmtEta(p.etaSec)}</span>`);
    }
  }
  return `<div class="queue-item-info">${parts.join(" · ")}</div>`;
}

function speedFactor(model) {
  return MODEL_SPEED[model] || 5;
}

function estimateTotalSec(audioDuration, model) {
  if (!audioDuration) return null;
  return audioDuration / speedFactor(model);
}

function refineEta(item) {
  // Refines ETA based on observed wall time of completed chunks
  const p = item.progress;
  if (!p || !p.totalChunks || !p.chunkTimings || p.chunkTimings.length === 0) return;
  const avg = p.chunkTimings.reduce((a, b) => a + b, 0) / p.chunkTimings.length;
  const remaining = p.totalChunks - (p.currentChunk - 1);
  // currentChunk is the in-flight one; subtract elapsed of the current chunk if known
  const nowElapsed = p.currentChunkStart ? (Date.now() - p.currentChunkStart) / 1000 : 0;
  const etaSec = Math.max(0, remaining * avg - nowElapsed);
  p.etaSec = etaSec;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function stripExt(name) {
  const i = name.lastIndexOf(".");
  return i > 0 ? name.slice(0, i) : name;
}

function fmtRecordingDate(d) {
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
}

function buildTitle(meta, createdAt) {
  if (meta && meta.isRecording) return `Recording ${fmtRecordingDate(new Date(createdAt))}`;
  if (meta && meta.sourceFilename) return stripExt(meta.sourceFilename) || meta.sourceFilename;
  return "Transcription";
}

// --- Waveform rendering ---

async function renderWaveform(file) {
  try {
    const arrayBuffer = await file.arrayBuffer();
    const actx = new AudioContext();
    const audioBuffer = await actx.decodeAudioData(arrayBuffer);
    actx.close();

    const channelData = audioBuffer.getChannelData(0);
    waveformContainer.classList.add("visible");

    // Force reflow then size canvas
    void waveformCanvas.offsetWidth;
    const dpr = window.devicePixelRatio || 1;
    const w = waveformCanvas.offsetWidth;
    const h = waveformCanvas.offsetHeight;
    waveformCanvas.width = w * dpr;
    waveformCanvas.height = h * dpr;
    waveformCtx.setTransform(1, 0, 0, 1, 0, 0);
    waveformCtx.scale(dpr, dpr);

    // Draw waveform — downsample to one min/max pair per pixel column
    const samplesPerPixel = Math.floor(channelData.length / w);
    const midY = h / 2;

    waveformCtx.fillStyle = "#1a1a1a";
    waveformCtx.fillRect(0, 0, w, h);

    // Draw center line
    waveformCtx.strokeStyle = "#333";
    waveformCtx.lineWidth = 0.5;
    waveformCtx.beginPath();
    waveformCtx.moveTo(0, midY);
    waveformCtx.lineTo(w, midY);
    waveformCtx.stroke();

    // Draw waveform
    waveformCtx.fillStyle = "#5b8def";
    for (let x = 0; x < w; x++) {
      const start = x * samplesPerPixel;
      const end = Math.min(start + samplesPerPixel, channelData.length);
      let min = 1, max = -1;
      for (let j = start; j < end; j++) {
        const val = channelData[j];
        if (val < min) min = val;
        if (val > max) max = val;
      }
      const top = midY - max * midY;
      const bottom = midY - min * midY;
      const barH = Math.max(1, bottom - top);
      waveformCtx.fillRect(x, top, 1, barH);
    }
  } catch {
    // Can't decode this audio format — hide waveform silently
    waveformContainer.classList.remove("visible");
  }
}

// --- Recording with visualizer + timer ---

// Detect best supported recording format
function getRecordingMimeType() {
  const types = [
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/ogg;codecs=opus",
    "audio/mp4",
    "",  // browser default
  ];
  for (const t of types) {
    if (!t || (typeof MediaRecorder !== "undefined" && MediaRecorder.isTypeSupported(t))) return t;
  }
  return "";
}
const recordingMimeType = getRecordingMimeType();

let audioContext = null;
let analyser = null;
let animFrameId = null;
let timerInterval = null;

function startVisualizer(stream) {
  audioContext = new AudioContext();
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;
  // Narrow the dynamic range so speech levels produce visible bars
  analyser.minDecibels = -60;
  analyser.maxDecibels = -10;
  const source = audioContext.createMediaStreamSource(stream);
  source.connect(analyser);

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw() {
    animFrameId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(dataArray);

    const dpr = window.devicePixelRatio || 1;
    const w = vizCanvas.width / dpr;
    const h = vizCanvas.height / dpr;
    vizCtx.clearRect(0, 0, vizCanvas.width, vizCanvas.height);

    const barCount = 20;
    const gap = 3;
    const barWidth = (w - gap * (barCount - 1)) / barCount;

    // Average nearby bins for each bar (more bins now with fftSize=256)
    const binsPerBar = Math.max(1, Math.floor(bufferLength / barCount));

    for (let i = 0; i < barCount; i++) {
      let sum = 0;
      const startBin = i * binsPerBar;
      for (let b = startBin; b < startBin + binsPerBar && b < bufferLength; b++) {
        sum += dataArray[b];
      }
      const val = (sum / binsPerBar) / 255;
      const barH = Math.max(2, val * h);
      const x = i * (barWidth + gap);
      const y = (h - barH) / 2;

      vizCtx.fillStyle = `rgba(211, 47, 47, ${0.4 + val * 0.6})`;
      vizCtx.beginPath();
      vizCtx.roundRect(x, y, barWidth, barH, 2);
      vizCtx.fill();
    }
  }
  draw();
}

function stopVisualizer() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  if (audioContext) audioContext.close();
  audioContext = null;
  analyser = null;
  animFrameId = null;
}

function startTimer() {
  const startTime = Date.now();
  recordingTimer.textContent = "00:00";
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2, "0");
    const s = String(elapsed % 60).padStart(2, "0");
    recordingTimer.textContent = `${m}:${s}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

recordBtn.addEventListener("click", async () => {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
    return;
  }
  try {
    const audioConstraints = selectedMicId && selectedMicId !== "default"
      ? { deviceId: { exact: selectedMicId } } : true;
    const stream = await navigator.mediaDevices.getUserMedia({ audio: audioConstraints });
    // Re-enumerate after permission grant to get full device labels
    enumerateMics();
    audioChunks = [];
    const recorderOpts = recordingMimeType ? { mimeType: recordingMimeType } : undefined;
    mediaRecorder = new MediaRecorder(stream, recorderOpts);
    const actualMime = mediaRecorder.mimeType || "audio/webm";
    const ext = actualMime.includes("mp4") ? "m4a" : actualMime.includes("ogg") ? "ogg" : "webm";
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach((t) => t.stop());
      stopVisualizer();
      stopTimer();
      const blob = new Blob(audioChunks, { type: actualMime });
      const recName = `Recording ${fmtRecordingDate(new Date())}.${ext}`;
      const file = new File([blob], recName, { type: actualMime });
      recordBtn.classList.remove("recording");
      recordBtn.textContent = "Record";
      dropZone.style.display = "";
      recordingViz.classList.remove("visible");
      // Push to queue as recording
      queue.push({
        file,
        isRecording: true,
        batchId: null,
        batchIndex: null,
        batchSize: null,
        status: "pending",
      });
      renderQueue();
      if (!processingQueue) processQueue();
    };
    mediaRecorder.start();
    recordBtn.classList.add("recording");
    recordBtn.textContent = "Stop";
    dropZone.style.display = "none";
    recordingViz.classList.add("visible");

    // Force reflow so offsetWidth reflects the now-visible element
    void vizCanvas.offsetWidth;

    // Size canvas to actual pixel dimensions for crisp rendering
    const dpr = window.devicePixelRatio || 1;
    vizCanvas.width = vizCanvas.offsetWidth * dpr;
    vizCanvas.height = vizCanvas.offsetHeight * dpr;
    vizCtx.setTransform(1, 0, 0, 1, 0, 0);
    vizCtx.scale(dpr, dpr);

    startVisualizer(stream);
    startTimer();
  } catch (err) {
    showError("Microphone access denied.");
  }
});

// --- Transcribe with SSE streaming ---

function countWords(text) {
  return text.trim().split(/\s+/).filter(Boolean).length;
}

async function doTranscribe(modelOverride, meta) {
  const modelToUse = modelOverride || modelSelect.value;
  if (!currentFile || isTranscribing) return false;

  // For re-transcribe (no meta), inherit from last result so title/batch carries forward
  const effMeta = meta || (lastResult ? {
    sourceFilename: lastResult.sourceFilename,
    isRecording: lastResult.isRecording,
    batchId: lastResult.batchId,
    batchIndex: lastResult.batchIndex,
    batchSize: lastResult.batchSize,
  } : { sourceFilename: currentFile.name, isRecording: currentFileIsRecording });

  isTranscribing = true;
  recordBtn.disabled = true;
  retranscribeBtn.disabled = true;
  spinner.classList.add("visible");
  statusEl.textContent = "Starting...";
  errorEl.classList.remove("visible");
  progressContainer.classList.remove("visible");
  progressBar.style.width = "0%";

  const form = new FormData();
  form.append("audio", currentFile);
  form.append("model", modelToUse);
  form.append("language", languageSelect.value || "auto");
  form.append("filename", effMeta.sourceFilename || currentFile.name);
  form.append("fromRecording", effMeta.isRecording ? "true" : "false");

  let errored = false;
  try {
    const res = await fetch("/api/transcribe", { method: "POST", body: form });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(text || "Transcription failed");
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        let payload;
        try { payload = JSON.parse(line.slice(6)); } catch { continue; }

        const item = currentTranscribingItem;
        if (payload.status === "loading_model") {
          statusEl.textContent = "Loading model...";
          if (item) {
            item.progress = item.progress || {};
            item.progress.phase = "loading_model";
            renderQueue();
          }
        } else if (payload.status === "downloading") {
          statusEl.textContent = `Downloading model... ${payload.progress}%`;
          progressContainer.classList.add("visible");
          progressBar.style.width = `${payload.progress}%`;
          if (item) {
            item.progress = item.progress || {};
            item.progress.phase = "downloading";
            item.progress.downloadProgress = payload.progress;
            renderQueue();
          }
        } else if (payload.status === "chunking") {
          const mins = Math.round(payload.duration / 60);
          statusEl.textContent = `Long audio (${mins} min) — splitting into chunks...`;
          if (item) {
            item.progress = {
              phase: "chunking",
              audioDuration: payload.duration,
              etaSec: estimateTotalSec(payload.duration, modelToUse),
              chunkTimings: [],
            };
            setTabTitle(`splitting · ${item.file.name}`);
            renderQueue();
          }
        } else if (payload.status === "chunked") {
          statusEl.textContent = `Split into ${payload.total} chunks of ${Math.round(payload.chunk_seconds/60)} min`;
          if (item) {
            item.progress = item.progress || {};
            item.progress.phase = "chunked";
            item.progress.totalChunks = payload.total;
            item.progress.chunkSeconds = payload.chunk_seconds;
            item.progress.etaSec = estimateTotalSec(item.progress.audioDuration, modelToUse);
            item.progress.chunkTimings = item.progress.chunkTimings || [];
            renderQueue();
          }
        } else if (payload.status === "transcribing") {
          progressContainer.classList.remove("visible");
          if (item && item.progress) {
            const p = item.progress;
            // Mark previous chunk's timing if applicable
            if (payload.chunk && payload.total && p.currentChunkStart) {
              const elapsed = (Date.now() - p.currentChunkStart) / 1000;
              p.chunkTimings = p.chunkTimings || [];
              p.chunkTimings.push(elapsed);
            }
            p.phase = "transcribing";
            if (payload.chunk && payload.total) {
              p.currentChunk = payload.chunk;
              p.totalChunks = payload.total;
              p.currentChunkStart = Date.now();
              refineEta(item);
              setTabTitle(`[${payload.chunk}/${payload.total}] ${item.file.name}`);
              progressContainer.classList.add("visible");
              progressBar.style.width = `${((payload.chunk - 1) / payload.total) * 100}%`;
              statusEl.textContent = `Transcribing chunk ${payload.chunk}/${payload.total}...`;
            } else {
              // Single-pass: set ETA from model speed if we know audio duration via waveform — skip otherwise
              p.currentChunkStart = Date.now();
              setTabTitle(`transcribing · ${item.file.name}`);
              statusEl.textContent = "Transcribing...";
            }
            renderQueue();
          } else if (payload.chunk && payload.total) {
            statusEl.textContent = `Transcribing chunk ${payload.chunk}/${payload.total}...`;
            progressContainer.classList.add("visible");
            progressBar.style.width = `${((payload.chunk - 1) / payload.total) * 100}%`;
          } else {
            statusEl.textContent = "Transcribing...";
          }
        } else if (payload.status === "result") {
          const words = countWords(payload.text);
          const createdAt = Date.now();
          lastResult = {
            text: payload.text, segments: payload.segments,
            language: payload.language, duration: payload.duration,
            model: modelToUse,
            sourceFilename: effMeta.sourceFilename,
            isRecording: !!effMeta.isRecording,
            batchId: effMeta.batchId || null,
            batchIndex: effMeta.batchIndex || null,
            batchSize: effMeta.batchSize || null,
          };
          updateRetranscribeUI(modelToUse);
          saveToHistory({
            id: newId(),
            createdAt,
            text: payload.text,
            language: payload.language,
            duration: payload.duration,
            model: modelToUse,
            words,
            segments: payload.segments.length,
            title: buildTitle(effMeta, createdAt),
            sourceFilename: effMeta.sourceFilename || currentFile.name,
            isRecording: !!effMeta.isRecording,
            batchId: effMeta.batchId || null,
            batchIndex: effMeta.batchIndex || null,
            batchSize: effMeta.batchSize || null,
          });
        } else if (payload.status === "error") {
          throw new Error(payload.error);
        }
      }
    }
  } catch (err) {
    errored = true;
    showError(err.message);
  } finally {
    spinner.classList.remove("visible");
    statusEl.textContent = "";
    progressContainer.classList.remove("visible");
    isTranscribing = false;
    recordBtn.disabled = false;
    retranscribeBtn.disabled = false;
  }
  if (errored) throw new Error("transcribe failed");
  return true;
}

// --- Re-transcribe ---

function updateRetranscribeUI(usedModel) {
  retranscribeModel.innerHTML = "";
  const models = ["tiny", "base", "small", "medium", "large-v3"];
  for (const m of models) {
    if (m === usedModel) continue;
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    retranscribeModel.appendChild(opt);
  }
  retranscribeEl.classList.add("visible");
}

retranscribeBtn.addEventListener("click", () => doTranscribe(retranscribeModel.value).catch(() => {}));

// --- Helpers ---

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.add("visible");
}

function formatDuration(s) {
  const m = Math.floor(s / 60);
  const sec = Math.round(s % 60);
  return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

// --- History (localStorage) ---

const HISTORY_KEY = "whisper-it-history";
const HISTORY_MAX = 100;
const historyEl = $("history");
const historyList = $("historyList");
const historyCount = $("historyCount");
const historyClear = $("historyClear");

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function writeHistory(items) {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(items));
  } catch (e) {
    // Quota exceeded — trim aggressively and retry once
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, 20))); } catch {}
  }
}

function saveToHistory(entry) {
  const items = loadHistory();
  items.unshift(entry);
  if (items.length > HISTORY_MAX) items.length = HISTORY_MAX;
  writeHistory(items);
  renderHistory();
}

function deleteHistoryItem(id) {
  const items = loadHistory().filter((it) => it.id !== id);
  writeHistory(items);
  renderHistory();
}

function clearHistory() {
  if (!confirm("Delete all saved transcriptions?")) return;
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function formatTimestamp(ts) {
  const d = new Date(ts);
  const now = new Date();
  const time = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return `Today ${time}`;
  const yesterday = new Date(now);
  yesterday.setDate(now.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return `Yesterday ${time}`;
  const sameYear = d.getFullYear() === now.getFullYear();
  const dateStr = d.toLocaleDateString([], sameYear
    ? { month: "short", day: "numeric" }
    : { year: "numeric", month: "short", day: "numeric" });
  return `${dateStr} ${time}`;
}

function renderHistory() {
  const items = loadHistory();
  if (items.length === 0) {
    historyEl.classList.remove("visible");
    historyList.innerHTML = "";
    historyCount.textContent = "";
    return;
  }
  historyEl.classList.add("visible");
  historyCount.textContent = items.length > 1 ? `(${items.length})` : "";
  historyClear.style.display = items.length > 1 ? "" : "none";
  historyList.innerHTML = "";

  // Count batch sizes present in history (for batch-zip button)
  const batchCounts = {};
  for (const it of items) {
    if (it.batchId) batchCounts[it.batchId] = (batchCounts[it.batchId] || 0) + 1;
  }

  items.forEach((it, idx) => {
    const row = document.createElement("div");
    row.className = "history-item" + (idx === 0 ? " latest expanded" : "");

    // Title row with badges
    const titleEl = document.createElement("div");
    titleEl.className = "history-item-title";
    const titleText = document.createElement("span");
    titleText.textContent = it.title || (it.sourceFilename ? stripExt(it.sourceFilename) : "Transcription");
    titleEl.appendChild(titleText);
    if (it.isRecording) {
      const rb = document.createElement("span");
      rb.className = "recording-badge";
      rb.textContent = "Recording";
      titleEl.appendChild(rb);
    }
    if (it.batchId && it.batchSize) {
      const bb = document.createElement("span");
      bb.className = "batch-badge";
      bb.textContent = `Batch \u00b7 ${it.batchIndex} of ${it.batchSize}`;
      bb.title = "Click to download all transcripts in this batch as a zip";
      bb.addEventListener("click", (e) => {
        e.stopPropagation();
        downloadBatchZip(it.batchId);
      });
      titleEl.appendChild(bb);
    }

    const header = document.createElement("div");
    header.className = "history-item-header";

    const metaEl = document.createElement("div");
    metaEl.className = "history-item-meta";
    const dur = it.duration != null ? formatDuration(it.duration) : "";
    const parts = [formatTimestamp(it.createdAt), it.language, dur, `${it.words || 0} words`, `${it.model} model`].filter(Boolean);
    metaEl.textContent = parts.join(" \u2022 ");

    const actions = document.createElement("div");
    actions.className = "history-item-actions";

    const copyBtn = document.createElement("button");
    copyBtn.textContent = "Copy";
    copyBtn.addEventListener("click", async (e) => {
      e.stopPropagation();
      try {
        await navigator.clipboard.writeText(it.text);
        copyBtn.textContent = "Copied!";
      } catch {
        copyBtn.textContent = "Failed";
      }
      setTimeout(() => { copyBtn.textContent = "Copy"; }, 1500);
    });
    actions.appendChild(copyBtn);

    const dlBtn = document.createElement("button");
    dlBtn.textContent = "Download";
    dlBtn.title = "Save transcript as .txt";
    dlBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      downloadTranscript(it);
    });
    actions.appendChild(dlBtn);

    if (it.batchId && batchCounts[it.batchId] > 1) {
      const zipBtn = document.createElement("button");
      zipBtn.textContent = "Zip batch";
      zipBtn.title = "Download all transcripts in this batch as a zip";
      zipBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        downloadBatchZip(it.batchId);
      });
      actions.appendChild(zipBtn);
    }

    if (navigator.share) {
      const shareBtn = document.createElement("button");
      shareBtn.textContent = "Share";
      shareBtn.addEventListener("click", async (e) => {
        e.stopPropagation();
        try {
          await navigator.share({ text: it.text });
        } catch (err) {
          if (err.name !== "AbortError") {
            navigator.clipboard.writeText(it.text);
            shareBtn.textContent = "Copied!";
            setTimeout(() => { shareBtn.textContent = "Share"; }, 1500);
          }
        }
      });
      actions.appendChild(shareBtn);
    }

    const delBtn = document.createElement("button");
    delBtn.className = "del";
    delBtn.textContent = "Delete";
    delBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      deleteHistoryItem(it.id);
    });
    actions.appendChild(delBtn);

    header.appendChild(metaEl);
    header.appendChild(actions);

    const preview = document.createElement("div");
    preview.className = "history-item-preview";
    preview.textContent = it.text;

    row.appendChild(titleEl);
    row.appendChild(header);
    row.appendChild(preview);
    row.addEventListener("click", () => row.classList.toggle("expanded"));

    historyList.appendChild(row);
  });
}

function transcriptFilename(it) {
  // Use source filename stem + .txt; fallback to title or id
  const base = it.sourceFilename ? stripExt(it.sourceFilename) : (it.title || "transcript");
  return sanitizeFilename(base) + ".txt";
}

function sanitizeFilename(name) {
  return String(name).replace(/[\\/:*?"<>|\x00-\x1f]/g, "_").trim().slice(0, 200) || "transcript";
}

function downloadTranscript(it) {
  const blob = new Blob([it.text], { type: "text/plain;charset=utf-8" });
  triggerDownload(blob, transcriptFilename(it));
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}

async function downloadBatchZip(batchId) {
  const items = loadHistory().filter(it => it.batchId === batchId);
  if (items.length === 0) return;
  // Order by batchIndex if present, else by createdAt asc
  items.sort((a, b) => (a.batchIndex || 0) - (b.batchIndex || 0) || a.createdAt - b.createdAt);
  const files = items.map(it => ({ name: transcriptFilename(it), text: it.text }));
  const zipName = `transcripts-${new Date().toISOString().slice(0,10)}.zip`;
  try {
    const res = await fetch("/api/zip", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ files, zipName }),
    });
    if (!res.ok) throw new Error("Zip request failed");
    const blob = await res.blob();
    triggerDownload(blob, zipName);
  } catch (err) {
    showError("Failed to download zip: " + err.message);
  }
}

historyClear.addEventListener("click", clearHistory);
renderHistory();

// --- Vanity stats one-liner ---

function fmtVanityDur(s) {
  if (!s || s < 60) return `${Math.round(s || 0)}s`;
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

async function loadVanityStats() {
  try {
    const res = await fetch("/api/stats");
    if (!res.ok) return;
    const s = await res.json();
    const el = $("vanity");
    if (!s || !s.total) {
      el.innerHTML = `<a href="/stats.html">No transcriptions yet — make the first one</a>`;
    } else {
      const wordsStr = (s.totalWords || 0).toLocaleString();
      el.innerHTML = `<a href="/stats.html">${s.total} transcription${s.total === 1 ? "" : "s"} · ${fmtVanityDur(s.totalDurationSec)} of audio · ${wordsStr} words</a>`;
    }
    el.classList.add("visible");
  } catch {}
}

loadVanityStats();

// Refresh after each new transcription completes
const _origSaveToHistory = saveToHistory;
saveToHistory = function(entry) {
  _origSaveToHistory(entry);
  loadVanityStats();
};

// Tick ETA + tab title every second while transcribing
setInterval(() => {
  const item = currentTranscribingItem;
  if (!item || !item.progress) return;
  const p = item.progress;
  if (p.phase !== "transcribing" && p.phase !== "chunking" && p.phase !== "chunked") return;
  if (p.totalChunks && p.currentChunk && p.currentChunkStart) {
    refineEta(item);
    const etaTxt = p.etaSec ? ` · ~${fmtEta(p.etaSec)}` : "";
    setTabTitle(`[${p.currentChunk}/${p.totalChunks}]${etaTxt} ${item.file.name}`);
  } else if (p.audioDuration && p.etaSec) {
    p.etaSec = Math.max(0, p.etaSec - 1);
  }
  renderQueue();
}, 1000);
</script>
