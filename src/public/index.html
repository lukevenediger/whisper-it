<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisper It</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f0f; color: #e0e0e0;
    display: flex; justify-content: center;
    min-height: 100vh; padding: 2rem 1rem;
  }
  .container { max-width: 640px; width: 100%; }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #fff; }
  h1 span { color: #888; font-weight: 400; font-size: 0.9rem; }

  .controls { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
  select, button {
    padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #333;
    background: #1a1a1a; color: #e0e0e0; font-size: 0.9rem; cursor: pointer;
  }
  select:focus, button:focus { outline: 2px solid #5b8def; outline-offset: -1px; }
  button:hover { background: #252525; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #5b8def; color: #fff; border-color: #5b8def; font-weight: 600; }
  .btn-primary:hover { background: #4a7de0; }
  .btn-record { background: #1a1a1a; }
  .btn-record.recording { background: #d32f2f; border-color: #d32f2f; color: #fff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

  .drop-zone {
    border: 2px dashed #333; border-radius: 8px; padding: 2rem;
    text-align: center; color: #666; margin-bottom: 1rem;
    transition: border-color 0.2s, background 0.2s; cursor: pointer;
  }
  .drop-zone.dragover { border-color: #5b8def; background: rgba(91,141,239,0.05); }
  .drop-zone.has-file { border-color: #4caf50; color: #aaa; }
  .drop-zone input { display: none; }
  .file-name { color: #5b8def; font-weight: 500; word-break: break-all; }

  .recording-viz {
    display: none; flex-direction: column; align-items: center; gap: 0.75rem;
    padding: 1.5rem; border: 2px solid #d32f2f; border-radius: 8px;
    background: rgba(211,47,47,0.05); margin-bottom: 1rem;
  }
  .recording-viz.visible { display: flex; }
  .recording-viz canvas { width: 100%; height: 60px; border-radius: 4px; }
  .recording-timer {
    font-size: 1.5rem; font-weight: 600; color: #d32f2f;
    font-variant-numeric: tabular-nums;
  }

  .waveform-container {
    display: none; margin-bottom: 1rem; border: 1px solid #333;
    border-radius: 8px; overflow: hidden; background: #1a1a1a;
  }
  .waveform-container.visible { display: block; }
  .waveform-container canvas { width: 100%; height: 80px; display: block; }

  .result {
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    padding: 1.25rem; margin-top: 1rem; display: none; position: relative;
  }
  .result.visible { display: block; }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .result-meta { font-size: 0.8rem; color: #888; }
  .result-actions { display: flex; gap: 0.5rem; }
  .action-btn {
    padding: 0.3rem 0.6rem; font-size: 0.8rem; border-radius: 4px;
    background: #252525; border: 1px solid #444; color: #ccc; cursor: pointer;
  }
  .action-btn:hover { background: #333; }
  .transcript { white-space: pre-wrap; line-height: 1.6; font-size: 0.95rem; }

  .retranscribe {
    display: none; align-items: center; gap: 0.5rem;
    margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #333;
    font-size: 0.85rem; color: #888; flex-wrap: wrap;
  }
  .retranscribe.visible { display: flex; }
  .retranscribe select { padding: 0.3rem 0.5rem; font-size: 0.85rem; }
  .retranscribe button { padding: 0.3rem 0.75rem; font-size: 0.85rem; }

  .spinner {
    display: none; margin: 1.5rem auto; width: 32px; height: 32px;
    border: 3px solid #333; border-top-color: #5b8def; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .spinner.visible { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { text-align: center; color: #888; margin-top: 0.5rem; font-size: 0.85rem; }

  .progress-bar-container {
    width: 60%; margin: 0.5rem auto 0; background: #252525;
    border-radius: 4px; height: 6px; overflow: hidden; display: none;
  }
  .progress-bar-container.visible { display: block; }
  .progress-bar {
    height: 100%; background: #5b8def; border-radius: 4px;
    transition: width 0.3s ease; width: 0%;
  }

  .mic-selector {
    display: none; margin-bottom: 1rem; padding: 0.75rem 1rem;
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    font-size: 0.85rem;
  }
  .mic-selector.visible { display: block; }
  .mic-selector-label { color: #888; margin-bottom: 0.5rem; }
  .mic-option {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.3rem 0; cursor: pointer; color: #ccc;
  }
  .mic-option:hover { color: #fff; }
  .mic-option input[type="radio"] {
    accent-color: #5b8def; width: 16px; height: 16px;
    cursor: pointer; margin: 0;
  }

  .error { color: #ef5350; background: rgba(239,83,80,0.1); padding: 0.75rem; border-radius: 6px; margin-top: 1rem; display: none; }
  .error.visible { display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>Whisper It <span>local transcription</span></h1>

  <div class="controls">
    <select id="model">
      <option value="tiny">tiny (~75MB)</option>
      <option value="base">base (~140MB)</option>
      <option value="small" selected>small (~460MB)</option>
      <option value="medium">medium (~1.5GB)</option>
      <option value="large-v3">large-v3 (~3GB)</option>
    </select>
    <button id="recordBtn" class="btn-record" title="Record from microphone">Record</button>
  </div>

  <div class="mic-selector" id="micSelector">
    <div class="mic-selector-label">Microphone</div>
    <div id="micList"></div>
  </div>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="audio/*,.mp3,.m4a,.wav,.ogg,.webm,.flac,.aac">
    <p>Drop audio file here or click to browse</p>
  </div>

  <div class="recording-viz" id="recordingViz">
    <canvas id="vizCanvas"></canvas>
    <div class="recording-timer" id="recordingTimer">00:00</div>
  </div>

  <div class="waveform-container" id="waveformContainer">
    <canvas id="waveformCanvas"></canvas>
  </div>

  <div class="spinner" id="spinner"></div>
  <div class="status" id="status"></div>
  <div class="progress-bar-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="result-header">
      <span class="result-meta" id="meta"></span>
      <div class="result-actions">
        <button class="action-btn" id="copyBtn">Copy</button>
        <button class="action-btn" id="shareBtn" style="display:none">Share</button>
      </div>
    </div>
    <div class="transcript" id="transcript"></div>
    <div class="retranscribe" id="retranscribe">
      <span>Re-transcribe with:</span>
      <select id="retranscribeModel"></select>
      <button id="retranscribeBtn" class="btn-primary">Re-transcribe</button>
    </div>
  </div>
</div>

<script>
const $ = (s) => document.getElementById(s);
const dropZone = $("dropZone");
const fileInput = $("fileInput");
const recordBtn = $("recordBtn");
const spinner = $("spinner");
const statusEl = $("status");
const errorEl = $("error");
const resultEl = $("result");
const transcript = $("transcript");
const meta = $("meta");
const copyBtn = $("copyBtn");
const shareBtn = $("shareBtn");
const modelSelect = $("model");
const recordingViz = $("recordingViz");
const vizCanvas = $("vizCanvas");
const vizCtx = vizCanvas.getContext("2d");
const recordingTimer = $("recordingTimer");
const progressContainer = $("progressContainer");
const progressBar = $("progressBar");
const retranscribeEl = $("retranscribe");
const retranscribeModel = $("retranscribeModel");
const retranscribeBtn = $("retranscribeBtn");
const waveformContainer = $("waveformContainer");
const waveformCanvas = $("waveformCanvas");
const waveformCtx = waveformCanvas.getContext("2d");

const micSelector = $("micSelector");
const micList = $("micList");

let currentFile = null;
let mediaRecorder = null;
let audioChunks = [];
let lastResult = null;
let isTranscribing = false;
let selectedMicId = null;

// --- Microphone enumeration ---

async function enumerateMics() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const mics = devices.filter(d => d.kind === "audioinput");
    if (mics.length <= 1) {
      micSelector.classList.remove("visible");
      selectedMicId = mics[0]?.deviceId || null;
      return;
    }
    micSelector.classList.add("visible");
    micList.innerHTML = "";
    mics.forEach((mic, i) => {
      const label = mic.label || `Microphone ${i + 1}`;
      const id = `mic-${i}`;
      const isSelected = selectedMicId ? mic.deviceId === selectedMicId : i === 0;
      if (isSelected) selectedMicId = mic.deviceId;

      const option = document.createElement("label");
      option.className = "mic-option";
      option.innerHTML = `<input type="radio" name="mic" value="${mic.deviceId}" id="${id}" ${isSelected ? "checked" : ""}> ${label}`;
      option.querySelector("input").addEventListener("change", (e) => {
        selectedMicId = e.target.value;
      });
      micList.appendChild(option);
    });
  } catch {
    // Can't enumerate — will use default mic
  }
}

// Enumerate on load (labels may be empty until permission is granted)
enumerateMics();
// Re-enumerate when devices change (e.g. plugging in a headset)
navigator.mediaDevices.addEventListener("devicechange", enumerateMics);

// --- File upload (auto-transcribe on selection) ---

dropZone.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => { if (fileInput.files[0]) setFileAndTranscribe(fileInput.files[0]); });

dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  if (e.dataTransfer.files[0]) setFileAndTranscribe(e.dataTransfer.files[0]);
});

function setFile(file) {
  currentFile = file;
  dropZone.classList.add("has-file");
  dropZone.querySelector("p").innerHTML = `<span class="file-name">${file.name}</span> (${(file.size / 1024 / 1024).toFixed(1)} MB)`;
}

function setFileAndTranscribe(file) {
  setFile(file);
  renderWaveform(file).then(() => doTranscribe());
}

// --- Waveform rendering ---

async function renderWaveform(file) {
  try {
    const arrayBuffer = await file.arrayBuffer();
    const actx = new AudioContext();
    const audioBuffer = await actx.decodeAudioData(arrayBuffer);
    actx.close();

    const channelData = audioBuffer.getChannelData(0);
    waveformContainer.classList.add("visible");

    // Force reflow then size canvas
    void waveformCanvas.offsetWidth;
    const dpr = window.devicePixelRatio || 1;
    const w = waveformCanvas.offsetWidth;
    const h = waveformCanvas.offsetHeight;
    waveformCanvas.width = w * dpr;
    waveformCanvas.height = h * dpr;
    waveformCtx.setTransform(1, 0, 0, 1, 0, 0);
    waveformCtx.scale(dpr, dpr);

    // Draw waveform — downsample to one min/max pair per pixel column
    const samplesPerPixel = Math.floor(channelData.length / w);
    const midY = h / 2;

    waveformCtx.fillStyle = "#1a1a1a";
    waveformCtx.fillRect(0, 0, w, h);

    // Draw center line
    waveformCtx.strokeStyle = "#333";
    waveformCtx.lineWidth = 0.5;
    waveformCtx.beginPath();
    waveformCtx.moveTo(0, midY);
    waveformCtx.lineTo(w, midY);
    waveformCtx.stroke();

    // Draw waveform
    waveformCtx.fillStyle = "#5b8def";
    for (let x = 0; x < w; x++) {
      const start = x * samplesPerPixel;
      const end = Math.min(start + samplesPerPixel, channelData.length);
      let min = 1, max = -1;
      for (let j = start; j < end; j++) {
        const val = channelData[j];
        if (val < min) min = val;
        if (val > max) max = val;
      }
      const top = midY - max * midY;
      const bottom = midY - min * midY;
      const barH = Math.max(1, bottom - top);
      waveformCtx.fillRect(x, top, 1, barH);
    }
  } catch {
    // Can't decode this audio format — hide waveform silently
    waveformContainer.classList.remove("visible");
  }
}

// --- Recording with visualizer + timer ---

// Detect best supported recording format
function getRecordingMimeType() {
  const types = [
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/ogg;codecs=opus",
    "audio/mp4",
    "",  // browser default
  ];
  for (const t of types) {
    if (!t || (typeof MediaRecorder !== "undefined" && MediaRecorder.isTypeSupported(t))) return t;
  }
  return "";
}
const recordingMimeType = getRecordingMimeType();

let audioContext = null;
let analyser = null;
let animFrameId = null;
let timerInterval = null;

function startVisualizer(stream) {
  audioContext = new AudioContext();
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;
  // Narrow the dynamic range so speech levels produce visible bars
  analyser.minDecibels = -60;
  analyser.maxDecibels = -10;
  const source = audioContext.createMediaStreamSource(stream);
  source.connect(analyser);

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw() {
    animFrameId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(dataArray);

    const dpr = window.devicePixelRatio || 1;
    const w = vizCanvas.width / dpr;
    const h = vizCanvas.height / dpr;
    vizCtx.clearRect(0, 0, vizCanvas.width, vizCanvas.height);

    const barCount = 20;
    const gap = 3;
    const barWidth = (w - gap * (barCount - 1)) / barCount;

    // Average nearby bins for each bar (more bins now with fftSize=256)
    const binsPerBar = Math.max(1, Math.floor(bufferLength / barCount));

    for (let i = 0; i < barCount; i++) {
      let sum = 0;
      const startBin = i * binsPerBar;
      for (let b = startBin; b < startBin + binsPerBar && b < bufferLength; b++) {
        sum += dataArray[b];
      }
      const val = (sum / binsPerBar) / 255;
      const barH = Math.max(2, val * h);
      const x = i * (barWidth + gap);
      const y = (h - barH) / 2;

      vizCtx.fillStyle = `rgba(211, 47, 47, ${0.4 + val * 0.6})`;
      vizCtx.beginPath();
      vizCtx.roundRect(x, y, barWidth, barH, 2);
      vizCtx.fill();
    }
  }
  draw();
}

function stopVisualizer() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  if (audioContext) audioContext.close();
  audioContext = null;
  analyser = null;
  animFrameId = null;
}

function startTimer() {
  const startTime = Date.now();
  recordingTimer.textContent = "00:00";
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2, "0");
    const s = String(elapsed % 60).padStart(2, "0");
    recordingTimer.textContent = `${m}:${s}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

recordBtn.addEventListener("click", async () => {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
    return;
  }
  try {
    const audioConstraints = selectedMicId ? { deviceId: { exact: selectedMicId } } : true;
    const stream = await navigator.mediaDevices.getUserMedia({ audio: audioConstraints });
    // Re-enumerate after permission grant to get full device labels
    enumerateMics();
    audioChunks = [];
    const recorderOpts = recordingMimeType ? { mimeType: recordingMimeType } : undefined;
    mediaRecorder = new MediaRecorder(stream, recorderOpts);
    const actualMime = mediaRecorder.mimeType || "audio/webm";
    const ext = actualMime.includes("mp4") ? "m4a" : actualMime.includes("ogg") ? "ogg" : "webm";
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach((t) => t.stop());
      stopVisualizer();
      stopTimer();
      const blob = new Blob(audioChunks, { type: actualMime });
      const file = new File([blob], `recording.${ext}`, { type: actualMime });
      setFile(file);
      recordBtn.classList.remove("recording");
      recordBtn.textContent = "Record";
      dropZone.style.display = "";
      recordingViz.classList.remove("visible");
      // Auto-transcribe after recording (render waveform first, then transcribe)
      renderWaveform(file).then(() => doTranscribe());
    };
    mediaRecorder.start();
    recordBtn.classList.add("recording");
    recordBtn.textContent = "Stop";
    dropZone.style.display = "none";
    recordingViz.classList.add("visible");

    // Force reflow so offsetWidth reflects the now-visible element
    void vizCanvas.offsetWidth;

    // Size canvas to actual pixel dimensions for crisp rendering
    const dpr = window.devicePixelRatio || 1;
    vizCanvas.width = vizCanvas.offsetWidth * dpr;
    vizCanvas.height = vizCanvas.offsetHeight * dpr;
    vizCtx.setTransform(1, 0, 0, 1, 0, 0);
    vizCtx.scale(dpr, dpr);

    startVisualizer(stream);
    startTimer();
  } catch (err) {
    showError("Microphone access denied.");
  }
});

// --- Transcribe with SSE streaming ---

function countWords(text) {
  return text.trim().split(/\s+/).filter(Boolean).length;
}

async function doTranscribe(modelOverride) {
  const modelToUse = modelOverride || modelSelect.value;
  if (!currentFile || isTranscribing) return;

  isTranscribing = true;
  recordBtn.disabled = true;
  retranscribeBtn.disabled = true;
  spinner.classList.add("visible");
  statusEl.textContent = "Starting...";
  errorEl.classList.remove("visible");
  resultEl.classList.remove("visible");
  progressContainer.classList.remove("visible");
  progressBar.style.width = "0%";

  const form = new FormData();
  form.append("audio", currentFile);
  form.append("model", modelToUse);

  try {
    const res = await fetch("/api/transcribe", { method: "POST", body: form });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(text || "Transcription failed");
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        let payload;
        try { payload = JSON.parse(line.slice(6)); } catch { continue; }

        if (payload.status === "loading_model") {
          statusEl.textContent = "Loading model...";
        } else if (payload.status === "downloading") {
          statusEl.textContent = `Downloading model... ${payload.progress}%`;
          progressContainer.classList.add("visible");
          progressBar.style.width = `${payload.progress}%`;
        } else if (payload.status === "transcribing") {
          progressContainer.classList.remove("visible");
          statusEl.textContent = "Transcribing...";
        } else if (payload.status === "result") {
          const words = countWords(payload.text);
          lastResult = {
            text: payload.text, segments: payload.segments,
            language: payload.language, duration: payload.duration,
            model: modelToUse,
          };
          transcript.textContent = payload.text;
          meta.textContent = `${payload.language} \u2022 ${formatDuration(payload.duration)} \u2022 ${words} words \u2022 ${payload.segments.length} segments \u2022 ${modelToUse} model`;
          resultEl.classList.add("visible");
          updateRetranscribeUI(modelToUse);
        } else if (payload.status === "error") {
          throw new Error(payload.error);
        }
      }
    }
  } catch (err) {
    showError(err.message);
  } finally {
    spinner.classList.remove("visible");
    statusEl.textContent = "";
    progressContainer.classList.remove("visible");
    isTranscribing = false;
    recordBtn.disabled = false;
    retranscribeBtn.disabled = false;
  }
}

// --- Re-transcribe ---

function updateRetranscribeUI(usedModel) {
  retranscribeModel.innerHTML = "";
  const models = ["tiny", "base", "small", "medium", "large-v3"];
  for (const m of models) {
    if (m === usedModel) continue;
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    retranscribeModel.appendChild(opt);
  }
  retranscribeEl.classList.add("visible");
}

retranscribeBtn.addEventListener("click", () => doTranscribe(retranscribeModel.value));

// --- Copy + Share ---

copyBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(transcript.textContent);
    copyBtn.textContent = "Copied!";
  } catch {
    copyBtn.textContent = "Failed";
  }
  setTimeout(() => { copyBtn.textContent = "Copy"; }, 1500);
});

if (navigator.share) {
  shareBtn.style.display = "";
}

shareBtn.addEventListener("click", async () => {
  try {
    await navigator.share({ text: transcript.textContent });
  } catch (err) {
    if (err.name !== "AbortError") {
      navigator.clipboard.writeText(transcript.textContent);
      shareBtn.textContent = "Copied!";
      setTimeout(() => { shareBtn.textContent = "Share"; }, 1500);
    }
  }
});

// --- Helpers ---

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.add("visible");
}

function formatDuration(s) {
  const m = Math.floor(s / 60);
  const sec = Math.round(s % 60);
  return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}
</script>
</body>
</html>
